name: smoke-test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  cli-smoke-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Show version
        run: python scripts/bag2rawsync.py --version

      - name: Show help
        run: python scripts/bag2rawsync.py --help
